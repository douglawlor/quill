name: Docs artifacts

# Whenever a docs/*.md source changes, regenerate the matching HTML + EPUB with
# Pandoc and commit them back — so contributors don't have to install Pandoc or
# run it by hand, and the docs artifact parity guard stays satisfied.

on:
  push:
    branches: [main]
    paths:
      - "docs/**.md"
  pull_request:
    paths:
      - "docs/**.md"
  workflow_dispatch:

permissions:
  contents: write

# Only one regeneration per ref at a time; cancel stale runs.
concurrency:
  group: docs-artifacts-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          # On a PR, check out (and later push to) the PR's source branch;
          # on a main push, the branch itself.
          ref: ${{ github.head_ref || github.ref_name }}
          # default GITHUB_TOKEN is persisted so we can push the regen commit back
          persist-credentials: true

      - name: Install Pandoc
        run: sudo apt-get update && sudo apt-get install -y pandoc

      - name: Regenerate HTML + EPUB from docs/*.md
        run: |
          set -euo pipefail
          shopt -s nullglob
          for md in docs/*.md; do
            name="${md%.md}"
            pandoc "$md" -f gfm -t html5 -s -o "${name}.html"
            pandoc "$md" -f gfm -t epub3      -o "${name}.epub"
          done

      - name: Commit regenerated artifacts if they changed
        run: |
          set -euo pipefail
          if [ -z "$(git status --porcelain -- docs)" ]; then
            echo "Docs artifacts already up to date — nothing to commit."
            exit 0
          fi
          # Fork PRs can't be pushed to with the read-only GITHUB_TOKEN; the docs
          # parity guard will flag those so the contributor regenerates locally.
          head_repo="${{ github.event.pull_request.head.repo.full_name }}"
          if [ -n "$head_repo" ] && [ "$head_repo" != "${{ github.repository }}" ]; then
            echo "Fork PR ($head_repo): cannot push artifacts back. Diff of what's missing:"
            git --no-pager diff --stat -- docs
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/*.html docs/*.epub
          # [skip ci] avoids re-triggering; the commit only touches .html/.epub
          # (not .md) so the docs/**.md path filter wouldn't re-fire anyway.
          git commit -m "docs: regenerate HTML/EPUB artifacts [skip ci]"
          git push origin "HEAD:${{ github.head_ref || github.ref_name }}"
